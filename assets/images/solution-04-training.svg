    <text x="116" y="618" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#D97706" font-weight="700">03</text>
    <text x="146" y="610" dominant-baseline="middle" font-size="18" fill="#0F172A" font-weight="600">后厨人员操作卫生要求</text>
    <text x="146" y="632" dominant-baseline="middle" font-size="13" fill="#94A3B8">主讲：食品安全部 · 时长 60 分钟 · 必修</text>
    <rect x="560" y="612" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="560" y="612" width="18" height="8" rx="4" fill="url(#prog1)" opacity="0.5"/>
    <text x="750" y="616" dominant-baseline="middle" font-size="12" fill="#D97706" font-weight="600">  10%</text>
    <rect x="820" y="606" width="64" height="26" rx="13" fill="#FEF3C7"/>
    <text x="852" y="619" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#B45309" font-weight="700">待学习</text>
  </g>

  <!-- ===== 在线考核卡片 ===== -->
  <rect x="932" y="330" width="596" height="360" rx="24" fill="white" stroke="#E2E8F0"
        filter="drop-shadow(0 2px 8px rgba(15,23,42,0.05))"/>
  <g clip-path="url(#clip-exam)">
    <!-- 顶部渐变头部 -->
    <rect x="932" y="330" width="596" height="110" fill="url(#exam-header)"/>
    <rect x="932" y="330" width="596" height="24" rx="24" fill="url(#exam-header)"/>
    <!-- 装饰圆 -->
    <circle cx="1480" cy="340" r="70" fill="white" opacity="0.06"/>
    <circle cx="1500" cy="390" r="40" fill="white" opacity="0.06"/>
    <text x="968" y="368" dominant-baseline="middle" font-size="20" fill="white" font-weight="700">在线考核</text>
    <rect x="1340" y="354" width="72" height="26" rx="13" fill="rgba(255,255,255,0.2)"/>
    <text x="1376" y="367" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="white" font-weight="600">本月第 2 次</text>
    <!-- 考核标题 -->
    <text x="968" y="406" dominant-baseline="middle" font-size="18" fill="white" font-weight="600">食品安全基础知识测评</text>
    <text x="968" y="428" dominant-baseline="middle" font-size="13" fill="rgba(255,255,255,0.7)">通过线：80 分 · 共 40 题 · 限时 60 分钟</text>

    <!-- 得分展示区 -->
    <rect x="948" y="454" width="564" height="130" rx="18" fill="#F8FAFC" stroke="#E2E8F0"/>
    <!-- 圆形得分 -->
    <circle cx="1030" cy="519" r="46" fill="none" stroke="#E2E8F0" stroke-width="8"/>
    <circle cx="1030" cy="519" r="46" fill="none" stroke="url(#score-ring)" stroke-width="8"
            stroke-dasharray="258" stroke-dashoffset="36"
            stroke-linecap="round"
            transform="rotate(-90 1030 519)"/>
    <text x="1030" y="513" text-anchor="middle" dominant-baseline="middle" font-size="26" fill="#5B21B6" font-weight="800">86</text>
    <text x="1030" y="533" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">当前成绩</text>
    <!-- 得分详情 -->
    <line x1="1094" y1="466" x2="1094" y2="572" stroke="#E2E8F0" stroke-width="1.5"/>
    <text x="1114" y="480" dominant-baseline="middle" font-size="13" fill="#64748B">正确题数</text>
    <text x="1114" y="502" dominant-baseline="middle" font-size="22" fill="#0F172A" font-weight="700">34 <tspan font-size="13" fill="#94A3B8">/ 40 题</tspan></text>
    <text x="1114" y="530" dominant-baseline="middle" font-size="13" fill="#64748B">用时</text>
    <text x="1114" y="552" dominant-baseline="middle" font-size="22" fill="#0F172A" font-weight="700">42 <tspan font-size="13" fill="#94A3B8">分钟</tspan></text>
    <!-- 通过标签 -->
    <rect x="1360" y="494" width="72" height="50" rx="14" fill="#DCFCE7"/>
    <text x="1396" y="514" text-anchor="middle" dominant-baseline="middle" font-size="22">✅</text>
    <text x="1396" y="534" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#166534" font-weight="700">已通过</text>

    <!-- 知识点掌握情况 -->
    <text x="968" y="606" dominant-baseline="middle" font-size="15" fill="#475569" font-weight="600">知识点掌握情况</text>
    <!-- 进度条1 -->
    <text x="968" y="628" dominant-baseline="middle" font-size="13" fill="#64748B">食品储存</text>
    <rect x="1050" y="622" width="300" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="1050" y="622" width="270" height="8" rx="4" fill="#8B5CF6"/>
    <text x="1360" y="626" dominant-baseline="middle" font-size="13" fill="#6D28D9" font-weight="600">90%</text>
    <!-- 进度条2 -->
    <text x="968" y="652" dominant-baseline="middle" font-size="13" fill="#64748B">消毒规范</text>
    <rect x="1050" y="646" width="300" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="1050" y="646" width="240" height="8" rx="4" fill="#6366F1"/>
    <text x="1360" y="650" dominant-baseline="middle" font-size="13" fill="#4338CA" font-weight="600">80%</text>
    <!-- 进度条3 -->
    <text x="968" y="676" dominant-baseline="middle" font-size="13" fill="#64748B">应急处理</text>
    <rect x="1050" y="670" width="300" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="1050" y="670" width="195" height="8" rx="4" fill="#A78BFA"/>
    <text x="1360" y="674" dominant-baseline="middle" font-size="13" fill="#7C3AED" font-weight="600">65%</text>
