    <text x="146" y="444" dominant-baseline="middle" font-size="13" fill="#94A3B8">主讲：食品安全部 · 时长 45 分钟 · 必修</text>
    <!-- 进度条 -->
    <rect x="560" y="424" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="560" y="424" width="180" height="8" rx="4" fill="url(#prog3)"/>
    <text x="750" y="428" dominant-baseline="middle" font-size="12" fill="#10B981" font-weight="600">  100%</text>
