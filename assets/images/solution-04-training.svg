  <!-- ===== 四个统计卡片 ===== -->

  <!-- 卡片1：本月培训计划 -->
  <rect x="72" y="172" width="310" height="130" rx="22" fill="url(#card1-grad)"
        filter="drop-shadow(0 4px 12px rgba(109,40,217,0.10))"/>
  <!-- 装饰圆 -->
  <circle cx="348" cy="178" r="48" fill="#C4B5FD" opacity="0.25"/>
  <text x="108" y="214" dominant-baseline="middle" font-size="14" fill="#7C3AED" font-weight="600" letter-spacing="1">本月培训计划</text>
  <text x="108" y="264" dominant-baseline="middle" font-size="52" fill="#5B21B6" font-weight="800">4</text>
  <text x="158" y="264" dominant-baseline="middle" font-size="16" fill="#8B5CF6">项</text>
  <rect x="200" y="248" width="60" height="22" rx="11" fill="#C4B5FD" opacity="0.6"/>
  <text x="230" y="259" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#5B21B6" font-weight="700">进行中 2</text>

  <!-- 卡片2：已完成课程 -->
  <rect x="402" y="172" width="310" height="130" rx="22" fill="url(#card2-grad)"
        filter="drop-shadow(0 4px 12px rgba(67,56,202,0.10))"/>
  <circle cx="678" cy="178" r="48" fill="#A5B4FC" opacity="0.25"/>
  <text x="438" y="214" dominant-baseline="middle" font-size="14" fill="#4338CA" font-weight="600" letter-spacing="1">已完成课程</text>
  <text x="438" y="264" dominant-baseline="middle" font-size="52" fill="#3730A3" font-weight="800">18</text>
  <text x="510" y="264" dominant-baseline="middle" font-size="16" fill="#6366F1">门</text>
  <rect x="540" y="248" width="60" height="22" rx="11" fill="#A5B4FC" opacity="0.6"/>
  <text x="570" y="259" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#3730A3" font-weight="700">本月 +3</text>

