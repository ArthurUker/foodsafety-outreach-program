  <rect x="1062" y="172" width="466" height="130" rx="22" fill="url(#card4-grad)"
        filter="drop-shadow(0 4px 12px rgba(22,163,74,0.08))"/>
  <circle cx="1494" cy="178" r="60" fill="#6EE7B7" opacity="0.25"/>
  <text x="1098" y="214" dominant-baseline="middle" font-size="14" fill="#166534" font-weight="600" letter-spacing="1">培训覆盖率</text>
  <text x="1098" y="264" dominant-baseline="middle" font-size="52" fill="#16A34A" font-weight="800">96%</text>
  <!-- 小进度条 -->
  <rect x="1098" y="278" width="280" height="8" rx="4" fill="#A7F3D0"/>
  <rect x="1098" y="278" width="269" height="8" rx="4" fill="#16A34A"/>
  <text x="1390" y="282" dominant-baseline="middle" font-size="12" fill="#166534" font-weight="600">目标 100%</text>

  <!-- ===== 课程学习列表 ===== -->
  <rect x="72" y="330" width="840" height="360" rx="24" fill="white" stroke="#E2E8F0"
