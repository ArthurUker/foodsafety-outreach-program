  <circle cx="1008" cy="178" r="48" fill="#FCD34D" opacity="0.3"/>
  <text x="768" y="214" dominant-baseline="middle" font-size="14" fill="#B45309" font-weight="600" letter-spacing="1">待参加考核</text>
  <text x="768" y="264" dominant-baseline="middle" font-size="52" fill="#D97706" font-weight="800">7</text>
  <text x="818" y="264" dominant-baseline="middle" font-size="16" fill="#F59E0B">人</text>
  <rect x="848" y="248" width="72" height="22" rx="11" fill="#FDE68A" opacity="0.8"/>
  <text x="884" y="259" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#92400E" font-weight="700">截止 3天后</text>

