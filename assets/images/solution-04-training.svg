    <rect x="72" y="330" width="840" height="56" rx="0" fill="#FAFAFA"/>
    <rect x="72" y="330" width="840" height="24" rx="24" fill="#FAFAFA"/>
    <text x="108" y="358" dominant-baseline="middle" font-size="20" fill="#0F172A" font-weight="700">课程学习列表</text>
    <rect x="820" y="342" width="76" height="28" rx="14" fill="#EDE9FE"/>
    <text x="858" y="356" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#6D28D9" font-weight="600">共 3 门</text>

    <!-- 分隔线 -->
    <line x1="72" y1="386" x2="912" y2="386" stroke="#F1F5F9" stroke-width="1.5"/>

