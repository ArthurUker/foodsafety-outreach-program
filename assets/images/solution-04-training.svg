    <line x1="272" y1="730" x2="272" y2="816" stroke="#E2E8F0" stroke-width="1.5"/>

    <!-- 总体进度条 -->
    <text x="292" y="752" dominant-baseline="middle" font-size="13" fill="#64748B">整体完成度</text>
    <rect x="292" y="762" width="900" height="14" rx="7" fill="#E2E8F0"/>
    <rect x="292" y="762" width="756" height="14" rx="7" fill="url(#prog1)"/>
    <!-- 节点标记 -->
    <circle cx="516" cy="769" r="7" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="516" y="752" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#6D28D9">25%</text>
    <circle cx="742" cy="769" r="7" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="742" y="752" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#6D28D9">50%</text>
    <circle cx="968" cy="769" r="7" fill="white" stroke="#8B5CF6" stroke-width="2"/>
    <text x="968" y="752" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#6D28D9">75%</text>
    <text x="1202" y="769" dominant-baseline="middle" font-size="16" fill="#6D28D9" font-weight="700">84%</text>

    <!-- 右侧操作按钮 -->
    <rect x="1280" y="738" width="108" height="40" rx="20" fill="#EDE9FE"/>
    <text x="1334" y="758" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#6D28D9" font-weight="600">查看详情</text>
    <rect x="1404" y="738" width="108" height="40" rx="20" fill="#6D28D9"/>
    <text x="1458" y="758" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="white" font-weight="600">开始考核</text>

    <!-- 底部小标签 -->
    <text x="292" y="800" dominant-baseline="middle" font-size="12" fill="#94A3B8">已完成 18 门</text>
    <text x="430" y="800" dominant-baseline="middle" font-size="12" fill="#94A3B8">·</text>
    <text x="446" y="800" dominant-baseline="middle" font-size="12" fill="#94A3B8">进行中 3 门</text>
    <text x="572" y="800" dominant-baseline="middle" font-size="12" fill="#94A3B8">·</text>
    <text x="588" y="800" dominant-baseline="middle" font-size="12" fill="#94A3B8">未开始 1 门</text>
    <text x="714" y="800" dominant-baseline="middle" font-size="12" fill="#94A3B8">·</text>
    <text x="730" y="800" dominant-baseline="middle" font-size="12" fill="#94A3B8">预计完成日期：2026-03-31</text>
  </g>
</svg>