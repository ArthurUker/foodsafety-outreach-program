      <stop offset="1" stop-color="#DDD6FE"/>
    </linearGradient>
    <!-- 卡片2渐变 -->
    <linearGradient id="card2-grad" x1="402" y1="172" x2="712" y2="302" gradientUnits="userSpaceOnUse">
