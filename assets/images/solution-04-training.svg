    <rect x="88" y="396" width="808" height="80" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
    <!-- 左侧序号 -->
    <rect x="100" y="414" width="32" height="32" rx="10" fill="#DCFCE7"/>
