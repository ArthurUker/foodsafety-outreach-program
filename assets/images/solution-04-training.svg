    <text x="852" y="431" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#166534" font-weight="700">已完成</text>

    <!-- 课程2：餐具清洗消毒规范 -->
    <rect x="88" y="490" width="808" height="80" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
    <rect x="100" y="508" width="32" height="32" rx="10" fill="#DBEAFE"/>
    <text x="116" y="524" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="#2563EB" font-weight="700">02</text>
    <text x="146" y="516" dominant-baseline="middle" font-size="18" fill="#0F172A" font-weight="600">餐具清洗消毒规范</text>
    <text x="146" y="538" dominant-baseline="middle" font-size="13" fill="#94A3B8">主讲：卫生管理部 · 时长 30 分钟 · 必修</text>
    <rect x="560" y="518" width="180" height="8" rx="4" fill="#E2E8F0"/>
    <rect x="560" y="518" width="108" height="8" rx="4" fill="url(#prog2)"/>
    <text x="750" y="522" dominant-baseline="middle" font-size="12" fill="#3B82F6" font-weight="600">  60%</text>
    <rect x="820" y="512" width="64" height="26" rx="13" fill="#DBEAFE"/>
    <text x="852" y="525" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1D4ED8" font-weight="700">学习中</text>

    <!-- 课程3：后厨人员操作卫生要求 -->
    <rect x="88" y="584" width="808" height="80" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
