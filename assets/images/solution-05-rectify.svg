  <!-- 步骤1：发现问题 -->
  <circle cx="217" cy="227" r="28" fill="url(#step1-g)"
          filter="drop-shadow(0 3px 8px rgba(251,146,60,0.35))"/>
  <text x="217" y="227" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="white" font-weight="700">01</text>
  <text x="217" y="264" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#9A3412" font-weight="600">发现问题</text>

  <!-- 步骤2：责任分派 -->
  <circle cx="508" cy="227" r="28" fill="url(#step2-g)"
