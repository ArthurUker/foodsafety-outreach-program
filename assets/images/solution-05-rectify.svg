  <text x="508" y="227" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="white" font-weight="700">02</text>
  <text x="508" y="264" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#9A3412" font-weight="600">责任分派</text>

  <!-- 步骤3：整改中（当前激活） -->
  <circle cx="800" cy="227" r="32" fill="url(#step3-g)"
