  <text x="800" y="196" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#B45309" font-weight="700">当前阶段</text>

  <!-- 步骤4：复核验收 -->
  <circle cx="1090" cy="227" r="28" fill="url(#step4-g)" opacity="0.5"/>
  <text x="1090" y="227" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="white" font-weight="700">04</text>
  <text x="1090" y="264" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#9A3412" font-weight="600" opacity="0.6">复核验收</text>

