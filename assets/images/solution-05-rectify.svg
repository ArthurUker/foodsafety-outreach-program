  <text x="848" y="347" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#B45309" font-weight="600">整改中</text>
  <rect x="884" y="334" width="56" height="26" rx="13" fill="#DBEAFE"/>
  <text x="912" y="347" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#1D4ED8" font-weight="600">待复核</text>
