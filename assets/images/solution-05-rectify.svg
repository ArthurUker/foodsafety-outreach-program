    <text x="272" y="804" dominant-baseline="middle" font-size="22" fill="#EA580C" font-weight="800">12</text>
    <text x="298" y="804" dominant-baseline="middle" font-size="12" fill="#94A3B8">项</text>

    <line x1="370" y1="768" x2="370" y2="820" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="400" y="782" dominant-baseline="middle" font-size="12" fill="#94A3B8">整改中</text>
    <text x="400" y="804" dominant-baseline="middle" font-size="22" fill="#F97316" font-weight="800">5</text>
    <text x="422" y="804" dominant-baseline="middle" font-size="12" fill="#94A3B8">项</text>

    <line x1="490" y1="768" x2="490" y2="820" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="520" y="782" dominant-baseline="middle" font-size="12" fill="#94A3B8">待复核</text>
    <text x="520" y="804" dominant-baseline="middle" font-size="22" fill="#3B82F6" font-weight="800">3</text>
    <text x="542" y="804" dominant-baseline="middle" font-size="12" fill="#94A3B8">项</text>

    <line x1="610" y1="768" x2="610" y2="820" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="640" y="782" dominant-baseline="middle" font-size="12" fill="#94A3B8">已完成</text>
    <text x="640" y="804" dominant-baseline="middle" font-size="22" fill="#16A34A" font-weight="800">4</text>
    <text x="662" y="804" dominant-baseline="middle" font-size="12" fill="#94A3B8">项</text>

    <line x1="730" y1="768" x2="730" y2="820" stroke="#FED7AA" stroke-width="1.5"/>
    <!-- 整改完成率进度条 -->
