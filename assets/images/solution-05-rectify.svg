    <text x="1250" y="804" dominant-baseline="middle" font-size="22" fill="#DC2626" font-weight="800">2</text>
    <text x="1272" y="804" dominant-baseline="middle" font-size="12" fill="#94A3B8">项</text>

    <line x1="1340" y1="768" x2="1340" y2="820" stroke="#FED7AA" stroke-width="1.5"/>
    <text x="1370" y="782" dominant-baseline="middle" font-size="12" fill="#94A3B8">平均整改周期</text>
    <text x="1370" y="804" dominant-baseline="middle" font-size="22" fill="#0F172A" font-weight="800">4.2</text>
    <text x="1412" y="804" dominant-baseline="middle" font-size="12" fill="#94A3B8">天</text>
