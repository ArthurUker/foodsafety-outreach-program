  <circle cx="800" cy="227" r="38" fill="none" stroke="#FB923C" stroke-width="2" stroke-dasharray="4 3" opacity="0.6"/>
  <text x="800" y="227" text-anchor="middle" dominant-baseline="middle" font-size="16" fill="white" font-weight="700">03</text>
  <text x="800" y="268" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#7C2D12" font-weight="700">整改中</text>
