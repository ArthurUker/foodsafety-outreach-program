    <rect x="760" y="798" width="400" height="10" rx="5" fill="#FED7AA"/>
    <rect x="760" y="798" width="133" height="10" rx="5" fill="#EA580C"/>
    <text x="1170" y="803" dominant-baseline="middle" font-size="14" fill="#EA580C" font-weight="700">33%</text>

    <line x1="1220" y1="768" x2="1220" y2="820" stroke="#FED7AA" stroke-width="1.5"/>
