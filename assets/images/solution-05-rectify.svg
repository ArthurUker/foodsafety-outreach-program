  <text x="460" y="390" dominant-baseline="middle" font-size="13" fill="#94A3B8" font-weight="600">责任人</text>
  <text x="620" y="390" dominant-baseline="middle" font-size="13" fill="#94A3B8" font-weight="600">截止日期</text>
  <text x="800" y="390" dominant-baseline="middle" font-size="13" fill="#94A3B8" font-weight="600">状态</text>

  <!-- 记录1：整改中 -->
  <rect x="88" y="414" width="868" height="82" rx="16" fill="#FFFBF5" stroke="#FED7AA"/>
  <!-- 左侧高风险色条 -->
  <rect x="88" y="414" width="5" height="82" rx="3" fill="#F97316"/>
  <!-- 序号 -->
