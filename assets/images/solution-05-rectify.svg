  <rect x="102" y="524" width="28" height="28" rx="8" fill="#DBEAFE"/>
  <text x="116" y="538" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1D4ED8" font-weight="700">02</text>
  <text x="144" y="535" dominant-baseline="middle" font-size="17" fill="#0F172A" font-weight="600">留样柜温度记录不完整</text>
  <text x="144" y="555" dominant-baseline="middle" font-size="12" fill="#94A3B8">发现时间：2026-03-12 · 中风险</text>
  <circle cx="472" cy="547" r="14" fill="#DBEAFE"/>
  <text x="472" y="547" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#1D4ED8" font-weight="700">食</text>
  <text x="492" y="547" dominant-baseline="middle" font-size="14" fill="#475569">食堂经理</text>
  <text x="620" y="547" dominant-baseline="middle" font-size="14" fill="#475569">03-22</text>
  <rect x="790" y="534" width="72" height="26" rx="13" fill="#DBEAFE"/>
  <text x="826" y="547" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#1D4ED8" font-weight="700">待复核</text>

  <!-- 记录3：已完成 -->
  <rect x="88" y="598" width="868" height="82" rx="16" fill="#F8FAFC" stroke="#E2E8F0"/>
  <rect x="88" y="598" width="5" height="82" rx="3" fill="#10B981"/>
  <rect x="102" y="616" width="28" height="28" rx="8" fill="#DCFCE7"/>
  <text x="116" y="630" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#166534" font-weight="700">03</text>
  <text x="144" y="627" dominant-baseline="middle" font-size="17" fill="#0F172A" font-weight="600">食材标签标识不规范</text>
  <text x="144" y="647" dominant-baseline="middle" font-size="12" fill="#94A3B8">发现时间：2026-03-08 · 低风险</text>
  <circle cx="472" cy="639" r="14" fill="#DCFCE7"/>
  <text x="472" y="639" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#166534" font-weight="700">库</text>
  <text x="492" y="639" dominant-baseline="middle" font-size="14" fill="#475569">库房管理员</text>
