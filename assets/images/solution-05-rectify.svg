    <text x="1392" y="600" text-anchor="middle" dominant-baseline="middle" font-size="24" fill="#CBD5E1">＋</text>
    <text x="1392" y="630" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#CBD5E1">上传凭证</text>

    <!-- 复核结果 -->
    <text x="1028" y="672" dominant-baseline="middle" font-size="14" fill="#64748B" font-weight="600">✅ 复核结果</text>
    <rect x="1028" y="682" width="464" height="36" rx="12" fill="#DCFCE7" stroke="#A7F3D0"/>
    <text x="1260" y="700" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#166534" font-weight="600">复核通过 · 2026-03-18 · 复核人：食品安全主管</text>

    <!-- 操作按钮 -->
    <rect x="1028" y="730" width="210" height="40" rx="20" fill="#FFEDD5"/>
    <text x="1133" y="750" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="#C2410C" font-weight="600">编辑整改记录</text>
    <rect x="1254" y="730" width="210" height="40" rx="20" fill="#EA580C"/>
    <text x="1359" y="750" text-anchor="middle" dominant-baseline="middle" font-size="15" fill="white" font-weight="600">提交复核申请</text>
