    <text x="1244" y="600" text-anchor="middle" dominant-baseline="middle" font-size="28">📸</text>
    <text x="1244" y="630" text-anchor="middle" dominant-baseline="middle" font-size="11" fill="#94A3B8">现场照片</text>
    <!-- 上传更多 -->
