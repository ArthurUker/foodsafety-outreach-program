    <linearGradient id="step4-g" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F97316"/><stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="step5-g" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#EA580C"/><stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
    <!-- 右侧详情头部渐变 -->
