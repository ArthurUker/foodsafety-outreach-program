<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF7ED"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <linearGradient id="chart-area" x1="180" y1="420" x2="180" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EF4444" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0"/>
    </linearGradient>
    <style>
      text { font-family: "PingFang SC","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; }
    </style>
    <clipPath id="clip-trend"><rect x="72" y="330" width="840" height="320" rx="24"/></clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="900" rx="36" fill="url(#bg2)"/>
  <rect x="36" y="36" width="1528" height="828" rx="32" fill="#F8FAFC" stroke="#DDE7EF"
        filter="drop-shadow(0 8px 24px rgba(15,23,42,0.07))"/>

  <!-- ===== 顶部标题栏 ===== -->
  <rect x="72" y="72" width="1456" height="72" rx="18" fill="white" stroke="#E2E8F0"/>
  <!-- 标题 -->
  <text x="108" y="108" dominant-baseline="middle"
        font-size="32" fill="#0F172A" font-weight="700">风险预警中心</text>
  <!-- 导出按钮 -->
  <rect x="1348" y="88" width="164" height="40" rx="20" fill="#FEF3C7"/>
  <text x="1430" y="108" text-anchor="middle" dominant-baseline="middle"
        font-size="18" fill="#B45309" font-weight="600">导出预警报告</text>

  <!-- ===== 四个统计卡片 ===== -->

  <!-- 卡片1：本周异常项 -->
  <rect x="72" y="172" width="310" height="130" rx="22" fill="#FFF1F2" stroke="#FECDD3"/>
  <text x="108" y="218" dominant-baseline="middle" font-size="20" fill="#9F1239" font-weight="600">本周异常项</text>
  <text x="108" y="272" dominant-baseline="middle" font-size="56" fill="#DC2626" font-weight="700">12</text>
  <text x="190" y="272" dominant-baseline="middle" font-size="16" fill="#F87171">件</text>
  <path d="M340 230 L356 218 L356 226 L372 226" stroke="#EF4444" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="374" y="226" dominant-baseline="middle" font-size="13" fill="#EF4444" font-weight="600">↑18%</text>

  <!-- 卡片2：高风险点位 -->
  <rect x="402" y="172" width="310" height="130" rx="22" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="438" y="218" dominant-baseline="middle" font-size="20" fill="#9F1239" font-weight="600">高风险点位</text>
  <text x="438" y="272" dominant-baseline="middle" font-size="56" fill="#B91C1C" font-weight="700">3</text>
  <text x="476" y="272" dominant-baseline="middle" font-size="16" fill="#F87171">处</text>
  <path d="M670 230 L686 218 L686 226 L702 226" stroke="#B91C1C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <text x="704" y="226" dominant-baseline="middle" font-size="13" fill="#B91C1C" font-weight="600">↑1处</text>

  <!-- 卡片3：待处理问题 -->
  <rect x="732" y="172" width="310" height="130" rx="22" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="768" y="218" dominant-baseline="middle" font-size="20" fill="#9A3412" font-weight="600">待处理问题</text>
  <text x="768" y="272" dominant-baseline="middle" font-size="56" fill="#EA580C" font-weight="700">5</text>
  <text x="806" y="272" dominant-baseline="middle" font-size="16" fill="#FB923C">项</text>
  <rect x="960" y="208" width="72" height="26" rx="13" fill="#FED7AA"/>
  <text x="996" y="221" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#9A3412" font-weight="600">逾期 2 项</text>

  <!-- 卡片4：重复发生问题 -->
  <rect x="1062" y="172" width="466" height="130" rx="22" fill="#ECFDF5" stroke="#A7F3D0"/>
  <text x="1098" y="218" dominant-baseline="middle" font-size="20" fill="#166534" font-weight="600">重复发生问题</text>
  <text x="1098" y="272" dominant-baseline="middle" font-size="56" fill="#16A34A" font-weight="700">2</text>
  <text x="1136" y="272" dominant-baseline="middle" font-size="16" fill="#4ADE80">项</text>
  <rect x="1320" y="208" width="180" height="26" rx="13" fill="#A7F3D0"/>
  <text x="1410" y="221" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#166534" font-weight="600">需重点跟踪整改</text>

  <!-- ===== 异常事件趋势图 ===== -->
  <rect x="72" y="330" width="840" height="320" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="108" y="370" dominant-baseline="middle" font-size="24" fill="#0F172A" font-weight="700">异常事件趋势</text>

  <g clip-path="url(#clip-trend)">
    <!-- 网格线 -->
    <line x1="160" y1="400" x2="880" y2="400" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="160" y1="430" x2="880" y2="430" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="160" y1="460" x2="880" y2="460" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="160" y1="490" x2="880" y2="490" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="160" y1="520" x2="880" y2="520" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="160" y1="550" x2="880" y2="550" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="160" y1="580" x2="880" y2="580" stroke="#F1F5F9" stroke-width="1.5"/>
    <line x1="160" y1="610" x2="880" y2="610" stroke="#F1F5F9" stroke-width="1.5"/>
    <!-- 坐标轴 -->
    <line x1="160" y1="620" x2="880" y2="620" stroke="#CBD5E1" stroke-width="2"/>
    <line x1="160" y1="395" x2="160" y2="620" stroke="#CBD5E1" stroke-width="2"/>
    <!-- Y轴标签 -->
    <text x="150" y="620" text-anchor="end" dominant-baseline="middle" font-size="12" fill="#94A3B8">0</text>
    <text x="150" y="560" text-anchor="end" dominant-baseline="middle" font-size="12" fill="#94A3B8">5</text>
    <text x="150" y="500" text-anchor="end" dominant-baseline="middle" font-size="12" fill="#94A3B8">10</text>
    <text x="150" y="440" text-anchor="end" dominant-baseline="middle" font-size="12" fill="#94A3B8">15</text>
    <!-- X轴标签 -->
    <text x="200" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">周一</text>
    <text x="290" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">周二</text>
    <text x="380" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">周三</text>
    <text x="470" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">周四</text>
    <text x="560" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">周五</text>
    <text x="650" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">周六</text>
    <text x="740" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">周日</text>
    <text x="830" y="636" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#94A3B8">本周</text>
    <!-- 面积填充 -->
    <polygon points="200,580 290,540 380,555 470,500 560,520 650,460 740,475 830,450 830,620 200,620"
             fill="url(#chart-area)"/>
    <!-- 折线 -->
    <polyline points="200,580 290,540 380,555 470,500 560,520 650,460 740,475 830,450"
              fill="none" stroke="#EF4444" stroke-width="3.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 空心数据点 -->
    <circle cx="200" cy="580" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="290" cy="540" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="380" cy="555" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="470" cy="500" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="560" cy="520" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="650" cy="460" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
    <circle cx="740" cy="475" r="6" fill="white" stroke="#EF4444" stroke-width="2.5"/>
    <!-- 最后高亮点 + tooltip -->
    <circle cx="830" cy="450" r="9" fill="#EF4444"/>
    <circle cx="830" cy="450" r="5" fill="white"/>
    <rect x="800" y="425" width="60" height="22" rx="6" fill="#EF4444"/>
    <text x="830" y="436" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="white" font-weight="700">12件</text>
  </g>

  <!-- ===== 风险等级分布（饼图） ===== -->
  <rect x="932" y="330" width="596" height="320" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="968" y="370" dominant-baseline="middle" font-size="24" fill="#0F172A" font-weight="700">风险等级分布</text>
  <!-- 圆环 -->
  <circle cx="1100" cy="510" r="90" stroke="#FCA5A5" stroke-width="36" fill="none" opacity="0.4"/>
  <path d="M1100 420 A90 90 0 0 1 1177.9 555" stroke="#F59E0B" stroke-width="36" fill="none" stroke-linecap="butt"/>
  <path d="M1177.9 555 A90 90 0 0 1 1062 591.4" stroke="#EF4444" stroke-width="36" fill="none" stroke-linecap="butt"/>
  <!-- 中心文字 -->
  <text x="1100" y="504" text-anchor="middle" dominant-baseline="middle" font-size="28" fill="#0F172A" font-weight="700">12</text>
  <text x="1100" y="526" text-anchor="middle" dominant-baseline="middle" font-size="13" fill="#64748B">总异常项</text>
  <!-- 图例 -->
  <rect x="1230" y="455" width="16" height="16" rx="4" fill="#EF4444"/>
  <text x="1254" y="463" dominant-baseline="middle" font-size="17" fill="#334155" font-weight="600">高风险</text>
  <text x="1390" y="463" dominant-baseline="middle" font-size="17" fill="#EF4444" font-weight="700">3 件</text>
  <rect x="1230" y="495" width="16" height="16" rx="4" fill="#F59E0B"/>
  <text x="1254" y="503" dominant-baseline="middle" font-size="17" fill="#334155" font-weight="600">中风险</text>
  <text x="1390" y="503" dominant-baseline="middle" font-size="17" fill="#F59E0B" font-weight="700">7 件</text>
  <rect x="1230" y="535" width="16" height="16" rx="4" fill="#FCA5A5"/>
  <text x="1254" y="543" dominant-baseline="middle" font-size="17" fill="#334155" font-weight="600">低风险</text>
  <text x="1390" y="543" dominant-baseline="middle" font-size="17" fill="#FCA5A5" font-weight="700">2 件</text>

  <!-- ===== 底部重点问题栏 ===== -->
  <rect x="72" y="678" width="1456" height="110" rx="24" fill="white" stroke="#E2E8F0"/>
  <text x="108" y="733" dominant-baseline="middle" font-size="22" fill="#0F172A" font-weight="700">重点问题</text>
  <line x1="220" y1="695" x2="220" y2="771" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- 问题1 -->
  <text x="240" y="723" dominant-baseline="middle" font-size="18" fill="#475569">餐具消毒记录缺失</text>
  <rect x="240" y="738" width="88" height="26" rx="13" fill="#FEE2E2"/>
  <text x="284" y="751" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#B91C1C" font-weight="700">高风险</text>
  <line x1="570" y1="695" x2="570" y2="771" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- 问题2 -->
  <text x="590" y="723" dominant-baseline="middle" font-size="18" fill="#475569">冷藏温度异常</text>
  <rect x="590" y="738" width="88" height="26" rx="13" fill="#FEF3C7"/>
  <text x="634" y="751" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#B45309" font-weight="700">中风险</text>
  <line x1="900" y1="695" x2="900" y2="771" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- 问题3 -->
  <text x="920" y="723" dominant-baseline="middle" font-size="18" fill="#475569">食材留样不规范</text>
  <rect x="920" y="738" width="88" height="26" rx="13" fill="#FEE2E2"/>
  <text x="964" y="751" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#B91C1C" font-weight="700">高风险</text>
  <line x1="1230" y1="695" x2="1230" y2="771" stroke="#E2E8F0" stroke-width="1.5"/>
  <!-- 问题4 -->
  <text x="1250" y="723" dominant-baseline="middle" font-size="18" fill="#475569">从业人员健康证过期</text>
  <rect x="1250" y="738" width="88" height="26" rx="13" fill="#FEE2E2"/>
  <text x="1294" y="751" text-anchor="middle" dominant-baseline="middle" font-size="14" fill="#B91C1C" font-weight="700">高风险</text>
</svg>